<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CryptoMesh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <div class="topbar">
      <div class="logo">Crypto<em>Mesh</em></div>
      <div class="auth-area" id="auth-login">
        <input type="text" id="login-user" placeholder="username" />
        <input type="password" id="login-pass" placeholder="password" />
        <button class="btn btn-blue" onclick="doLogin()">Sign in</button>
        <button class="btn btn-ghost" onclick="openRegModal()">Register</button>
      </div>
      <div class="auth-area" id="auth-logged" style="display: none">
        <span
          class="user-badge"
          id="user-badge"
          style="display: inline-block"
        ></span>
        <button class="btn btn-ghost" onclick="doLogout()">Sign out</button>
      </div>
    </div>

    <div class="shell">
      <div class="sidebar">
        <div class="sidebar-header"><h3>Contacts</h3></div>
        <div class="user-list" id="user-list">
          <div
            style="
              color: var(--text3);
              font-size: 0.78rem;
              padding: 10px;
              text-align: center;
            "
          >
            Sign in to chat
          </div>
        </div>
        <div class="sidebar-footer">
          <button class="new-user-btn" onclick="openRegModal()">
            + New account
          </button>
        </div>
      </div>

      <div class="chat-area">
        <div class="chat-header">
          <div>
            <div class="chat-title" id="chat-title">Select a contact</div>
            <div class="chat-subtitle" id="chat-subtitle">
              X25519 · HKDF-SHA256 · AES-256-GCM · Ed25519
            </div>
          </div>
          <button class="btn-inspector" onclick="toggleInspector()">
            <span class="dot"></span> Crypto inspector
          </button>
        </div>

        <div class="messages" id="messages">
          <div class="empty-chat">
            <div class="icon">🔐</div>
            <p>Select a contact to start a secure conversation</p>
          </div>
        </div>

        <div class="compose">
          <textarea
            id="compose-input"
            placeholder="Write a message…"
            rows="1"
            disabled
            onkeydown="
              if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                doSend();
              }
            "
            oninput="
              this.style.height = 'auto';
              this.style.height = this.scrollHeight + 'px';
            "
          ></textarea>
          <button class="btn-send" id="btn-send" onclick="doSend()" disabled>
            ➤
          </button>
        </div>
      </div>

      <div class="inspector" id="inspector">
        <div class="inspector-header">
          <h3>⬡ Crypto inspector</h3>
          <button class="btn-close-inspector" onclick="toggleInspector()">
            ✕
          </button>
        </div>
        <div class="inspector-body" id="inspector-body">
          <div class="insp-placeholder">
            Click a message bubble to inspect its cryptographic operations
          </div>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="reg-modal">
      <div class="modal">
        <h3>Create account</h3>
        <div class="alert alert-err" id="reg-err"></div>
        <div class="alert alert-ok" id="reg-ok"></div>
        <div class="field">
          <label>Username</label
          ><input type="text" id="reg-user" placeholder="alice" />
        </div>
        <div class="field">
          <label>Password</label
          ><input type="password" id="reg-pass" placeholder="••••••••" />
        </div>
        <div class="modal-actions">
          <button class="btn btn-blue" onclick="doRegister()" style="flex: 1">
            Register
          </button>
          <button class="btn btn-ghost" onclick="closeRegModal()">
            Cancel
          </button>
        </div>
      </div>
    </div>

    <script src="/static/js/app.js"></script>
  </body>
</html>
